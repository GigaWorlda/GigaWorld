<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Гигаворлд сайт</title>
        <link rel="stylesheet" href="GigaWorld.css">
    </head>
    <body>
        <div class="box"></div>
        <h2>Добро пожаловать на сайт Gigaworld'а!</h2>
        <p class="skopirovat">gigaworld1488.aternos.me:49376</p>
        <img class="лого" src="GigaWorld.jpg" width="60px" alt="Логотип Gigaworld">
        <input class="копп" type="text" value="gigaworld1488.aternos.me:49376" id="server-address" readonly>
        <button class="кнопкакопи" onclick="copyToClipboard()">Копируй</button>
        <h1 class="ckoro">Скоро будет ещё</h1>

        <script>
            function copyToClipboard() {
                const copyText = document.getElementById("server-address");
                
                // Основной метод — navigator.clipboard (современные браузеры)
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(copyText.value)
                        .then(() => {
                            showNotification("Скопировано в буфер обмена!");
                })
                .catch(err => {
                    console.error('Ошибка при копировании через navigator.clipboard: ', err);
                    fallbackCopyMethod(copyText.value);
                });
        } else {
            // Резервный метод для старых браузеров или HTTP-страниц
            fallbackCopyMethod(copyText.value);
        }
    }

    // Резервный метод с использованием textarea
    function fallbackCopyMethod(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        // Стили для скрытия элемента
        textarea.style.position = 'fixed';
        textarea.style.left = '-999999px';
        textarea.style.top = '-999999px';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
            const successful = document.execCommand('copy');
            if (successful) {
                showNotification("Скопировано (альтернативный метод)!");
            } else {
                showNotification("Не удалось скопировать. Выделите и скопируйте вручную.");
            }
        } catch (err) {
            console.error('Ошибка альтернативного метода копирования: ', err);
            showNotification("Ошибка копирования. Скопируйте вручную.");
        }

        // Удаляем временный элемент
        document.body.removeChild(textarea);
    }

    // Функция для показа уведомления
    function showNotification(message) {
        // Создаём элемент уведомления
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 4px;
            z-index: 10000;
            font-family: Arial, sans-serif;
            font-size: 14px;
        `;
        document.body.appendChild(notification);

        // Автоматическое скрытие через 3 секунды
        setTimeout(() => {
            document.body.removeChild(notification);
        }, 3000);
    }
</script>
    </body>
</html>
